name: SwiftPM

on:
  pull_request:
  push:

jobs:
  validate:
    name: Build and Test SwiftPM Core
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show Swift version
        run: swift --version

      - name: Swift build
        run: swift build

      - name: Swift test
        run: swift test
